<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NFC Reader ke Google Sheets + QR Code</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background-color: #f3f4f6;
            color: #333;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #2563eb;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        .btn:disabled { background-color: #9ca3af; }
        #status {
            margin-top: 25px;
            font-size: 18px;
            font-weight: bold;
        }
        #log {
            margin-top: 15px;
            font-size: 14px;
            color: #6b7280;
        }
        /* Style Tambahan untuk Tampilan QR Code di Layar HP */
        #qrContainer {
            margin-top: 25px;
            display: none; /* Awalnya disembunyikan, muncul setelah scan */
        }
        #qrImage {
            width: 160px;
            height: 160px;
            border-radius: 10px;
            border: 2px solid #e5e7eb;
            padding: 5px;
            background-color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>NFC Scan App</h2>
    <p>Dekatkan kartu RFID/NFC ke bagian belakang HP setelah menekan tombol di bawah.</p>
    
    <button id="scanButton" class="btn">Mulai Pindai NFC</button>
    
    <div id="status" style="color: #4b5563;">Status: Siap</div>
    <div id="log">---</div>
    
    <div id="qrContainer">
        <p style="font-size: 14px; color: #4b5563; font-weight: bold; margin-bottom: 8px;">QR Code ID Kartu Anda:</p>
        <img id="qrImage" src="" alt="QR Code">
    </div>
</div>

<script>
    const scanButton = document.getElementById("scanButton");
    const statusDiv = document.getElementById("status");
    const logDiv = document.getElementById("log");
    
    // Panggil elemen kontainer QR Code
    const qrContainer = document.getElementById("qrContainer");
    const qrImage = document.getElementById("qrImage");

    // LAKUKAN: PASTE URL WEB APP BARU ANDA YANG BERAKHIRAN /exec DI SINI
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxOD0EAgX97WB9Zvc2ylEJ1vQg9w5MhNn3PtTlcTbujBKnYWgN8LS33yu-i_jGLAHaX/exec";

    scanButton.addEventListener("click", async () => {
        if (!("NDEFReader" in window)) {
            statusDiv.innerText = "Error: Browser Anda tidak mendukung Web NFC API.";
            statusDiv.style.color = "#dc2626";
            return;
        }

        try {
            statusDiv.innerText = "Status: Menghubungkan sensor...";
            const ndef = new NDEFReader();
            await ndef.scan();
            
            statusDiv.innerText = "Status: Tempelkan kartu NFC...";
            statusDiv.style.color = "#d97706";
            scanButton.disabled = true;

            ndef.addEventListener("readingerror", () => {
                logDiv.innerText = "Gagal membaca kartu. Coba tempelkan ulang.";
            });

            ndef.addEventListener("reading", async ({ serialNumber }) => {
                const uid = serialNumber.replace(/:/g, "").toUpperCase();
                logDiv.innerText = "UID Terbaca: " + uid;
                
                // 1. PROSES LOKAL: Langsung munculkan QR Code di layar HP saat itu juga
                qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${uid}`;
                qrContainer.style.display = "block";
                
                statusDiv.innerText = "Status: Memeriksa database...";
                statusDiv.style.color = "#2563eb";

                try {
                    // 2. PROSES ONLINE: Mengirim data ke Google Sheets untuk dicek & disimpan beserta QR-nya
                    const response = await fetch(`${APPS_SCRIPT_URL}?uid=${uid}`);
                    const data = await response.json();
                    
                    statusDiv.innerText = "Status: " + data.message;
                    
                    if (data.status === "success") {
                        statusDiv.style.color = "#16a34a"; // Hijau jika data baru sukses tersimpan ke Sheet
                    } else if (data.status === "exists") {
                        statusDiv.style.color = "#d97706"; // Oranye jika data sudah ada di database
                    } else {
                        statusDiv.style.color = "#dc2626";
                    }

                } catch (err) {
                    statusDiv.innerText = "Status: Gagal memproses ke sistem.";
                    statusDiv.style.color = "#dc2626";
                    logDiv.innerText = err.message;
                }

                // Siapkan pemindaian berikutnya
                setTimeout(() => {
                    statusDiv.innerText = "Status: Siap untuk kartu berikutnya...";
                    statusDiv.style.color = "#4b5563";
                    scanButton.disabled = false;
                }, 4000);
            });

        } catch (error) {
            statusDiv.innerText = "Error: " + error;
            statusDiv.style.color = "#dc2626";
            scanButton.disabled = false;
        }
    });
</script>

</body>
</html>
