<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Auto-Pairing NFC ke Google Sheets</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
            padding: 40px 20px;
            background-color: #f3f4f6;
            color: #333;
        }
        .container {
            max-width: 400px;
            margin: 0 auto;
            background: white;
            padding: 30px;
            border-radius: 15px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }
        .btn {
            padding: 15px 30px;
            font-size: 18px;
            font-weight: bold;
            color: white;
            background-color: #2563eb;
            border: none;
            border-radius: 8px;
            cursor: pointer;
            transition: background 0.3s;
            width: 100%;
        }
        .btn:disabled { background-color: #9ca3af; cursor: not-allowed; }
        #status {
            margin-top: 25px;
            font-size: 16px;
            font-weight: bold;
        }
        #log {
            margin-top: 15px;
            font-size: 14px;
            color: #6b7280;
        }
        #qrContainer {
            margin-top: 25px;
            display: none;
        }
        #qrImage {
            width: 160px;
            height: 160px;
            border-radius: 10px;
            border: 2px solid #e5e7eb;
            padding: 5px;
            background-color: white;
        }
    </style>
</head>
<body>

<div class="container">
    <h2>NFC Auto-Pairing</h2>
    <p>Aktifkan sensor, lalu tempelkan kartu secara berurutan. Sistem akan otomatis mengisi ke nama yang kosong.</p>
    
    <button id="scanButton" class="btn">Aktifkan Sensor NFC</button>
    
    <div id="status" style="color: #4b5563;">Status: Sensor Mati</div>
    <div id="log">---</div>
    
    <div id="qrContainer">
        <p style="font-size: 14px; color: #4b5563; font-weight: bold; margin-bottom: 8px;">QR Code Terbaru:</p>
        <img id="qrImage" src="" alt="QR Code">
    </div>
</div>

<script>
    const scanButton = document.getElementById("scanButton");
    const statusDiv = document.getElementById("status");
    const logDiv = document.getElementById("log");
    const qrContainer = document.getElementById("qrContainer");
    const qrImage = document.getElementById("qrImage");

    // PASTE URL WEB APP GOOGLE APPS SCRIPT YANG BARU DI SINI
    const APPS_SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwqbebr2X9KMrDVp-j6nRHIou26j7JosOr1uGL_Hstzqm4x6u0W3ZpD_tRdjWM8aEm3/exec";

    let ndef = null;
    let isProcessing = false;

    scanButton.addEventListener("click", async () => {
        if (!("NDEFReader" in window)) {
            statusDiv.innerText = "Error: Browser Anda tidak mendukung Web NFC API.";
            statusDiv.style.color = "#dc2626";
            return;
        }

        try {
            statusDiv.innerText = "Status: Menghubungkan sensor...";
            ndef = new NDEFReader();
            await ndef.scan();
            
            statusDiv.innerText = "Status: Sensor Aktif! Tempelkan kartu pertama...";
            statusDiv.style.color = "#d97706";
            scanButton.disabled = true; 
            scanButton.innerText = "Sensor NFC Siap";

            ndef.addEventListener("readingerror", () => {
                if (!isProcessing) {
                    logDiv.innerText = "Gagal membaca kartu. Coba tempelkan ulang.";
                }
            });

            ndef.addEventListener("reading", async ({ serialNumber }) => {
                if (isProcessing) return; 
                isProcessing = true; 
                
                const uid = serialNumber.replace(/:/g, "").toUpperCase();
                logDiv.innerText = "UID Terbaca: " + uid;
                
                qrImage.src = `https://api.qrserver.com/v1/create-qr-code/?size=160x160&data=${uid}`;
                qrContainer.style.display = "block";
                
                statusDiv.innerText = "Status: Menyimpan otomatis ke database...";
                statusDiv.style.color = "#2563eb";

                try {
                    // Hanya kirim UID, backend akan mencari baris yang kosong otomatis
                    const response = await fetch(`${APPS_SCRIPT_URL}?uid=${uid}`);
                    const data = await response.json();
                    
                    statusDiv.innerText = "Status: " + data.message;
                    
                    if (data.status === "success") {
                        statusDiv.style.color = "#16a34a"; // Hijau
                    } else if (data.status === "exists" || data.status === "full") {
                        statusDiv.style.color = "#d97706"; // Oranye
                    } else {
                        statusDiv.style.color = "#dc2626"; // Merah
                    }

                } catch (err) {
                    statusDiv.innerText = "Status: Gagal terhubung ke server.";
                    statusDiv.style.color = "#dc2626";
                    logDiv.innerText = err.message;
                }

                // Beri jeda 3 detik sebelum siap untuk kartu berikutnya
                setTimeout(() => {
                    statusDiv.innerText = "Status: Standby. Tempelkan kartu selanjutnya...";
                    statusDiv.style.color = "#d97706";
                    isProcessing = false; 
                }, 3000);
            });

        } catch (error) {
            statusDiv.innerText = "Error: Gagal mengaktifkan sensor. Pastikan NFC HP menyala.";
            statusDiv.style.color = "#dc2626";
            console.error(error);
        }
    });
</script>

</body>
</html>
